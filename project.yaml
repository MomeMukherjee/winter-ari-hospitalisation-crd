version: '3.0'

expectations:
  population_size: 500000

actions:

  # ─────────────────────────────────────────────
  # DATASET DEFINITIONS  (one per winter season)
  # ─────────────────────────────────────────────

  generate_dataset_2017_18:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2017_18.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2017_18
    outputs:
      highly_sensitive:
        dataset: output/dataset_2017_18.csv.gz

  generate_dataset_2018_19:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2018_19.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2018_19
    outputs:
      highly_sensitive:
        dataset: output/dataset_2018_19.csv.gz

  generate_dataset_2019_20:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2019_20.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2019_20
    outputs:
      highly_sensitive:
        dataset: output/dataset_2019_20.csv.gz

  generate_dataset_2020_21:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2020_21.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2020_21
    outputs:
      highly_sensitive:
        dataset: output/dataset_2020_21.csv.gz

  generate_dataset_2021_22:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2021_22.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2021_22
    outputs:
      highly_sensitive:
        dataset: output/dataset_2021_22.csv.gz

  generate_dataset_2022_23:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2022_23.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2022_23
    outputs:
      highly_sensitive:
        dataset: output/dataset_2022_23.csv.gz

  generate_dataset_2023_24:
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py
      --output output/dataset_2023_24.csv.gz
      --dummy-tables tests/dummy_tables
      -- --season 2023_24
    outputs:
      highly_sensitive:
        dataset: output/dataset_2023_24.csv.gz

  # ─────────────────────────────────────────────
  # Q1: BASELINE DEMOGRAPHICS + DESCRIPTIVE
  # ─────────────────────────────────────────────

  descriptive_stats:
    run: r:v2 analysis/01_descriptive_stats.R
    needs:
      - generate_dataset_2017_18
      - generate_dataset_2018_19
      - generate_dataset_2019_20
      - generate_dataset_2020_21
      - generate_dataset_2021_22
      - generate_dataset_2022_23
      - generate_dataset_2023_24
    outputs:
      moderately_sensitive:
        tables: output/tables/table1_*.csv
        figures: output/figures/fig_demographics_*.png

  # ─────────────────────────────────────────────
  # Q1: TEMPORAL TRENDS (weekly time-series)
  # ─────────────────────────────────────────────

  temporal_trends:
    run: r:v2 analysis/02_temporal_trends.R
    needs:
      - generate_dataset_2017_18
      - generate_dataset_2018_19
      - generate_dataset_2019_20
      - generate_dataset_2020_21
      - generate_dataset_2021_22
      - generate_dataset_2022_23
      - generate_dataset_2023_24
    outputs:
      moderately_sensitive:
        tables: output/tables/trend_*.csv
        figures: output/figures/fig_trend_*.png

  # ─────────────────────────────────────────────
  # Q2: RISK FACTOR ASSOCIATIONS
  # ─────────────────────────────────────────────

  risk_factors:
    run: r:v2 analysis/03_risk_factors.R
    needs:
      - generate_dataset_2017_18
      - generate_dataset_2018_19
      - generate_dataset_2019_20
      - generate_dataset_2020_21
      - generate_dataset_2021_22
      - generate_dataset_2022_23
      - generate_dataset_2023_24
    outputs:
      moderately_sensitive:
        tables: output/tables/rf_*.csv
        figures: output/figures/fig_rf_*.png

  # ─────────────────────────────────────────────
  # Q3i: INDIVIDUAL-LEVEL PREDICTION MODEL
  # ─────────────────────────────────────────────

  individual_prediction_model:
    run: r:v2 analysis/04_individual_prediction_model.R
    needs:
      - generate_dataset_2017_18
      - generate_dataset_2018_19
      - generate_dataset_2019_20
      - generate_dataset_2020_21
      - generate_dataset_2021_22
      - generate_dataset_2022_23
      - generate_dataset_2023_24
    outputs:
      moderately_sensitive:
        tables: output/models/indiv_model_*.csv
        figures: output/figures/fig_model_indiv_*.png

  # ─────────────────────────────────────────────
  # Q3ii: GP PRACTICE-LEVEL PREDICTION MODEL
  # ─────────────────────────────────────────────

  gp_practice_model:
    run: r:v2 analysis/05_gp_practice_model.R
    needs:
      - generate_dataset_2017_18
      - generate_dataset_2018_19
      - generate_dataset_2019_20
      - generate_dataset_2020_21
      - generate_dataset_2021_22
      - generate_dataset_2022_23
      - generate_dataset_2023_24
    outputs:
      moderately_sensitive:
        tables: output/models/gp_model_*.csv
        figures: output/figures/fig_model_gp_*.png
