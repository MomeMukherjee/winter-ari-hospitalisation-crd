version: '5.0'

expectations:
  population_size: 500000

actions:
  # Job 1: Generate dataset using ehrQL from dummy data
  generate_dataset_winter_2017_18:
    # Fixed: Changed the target path from 00_study_definition.ehrql to dataset_definition.py
    run: ehrql:v1 generate-dataset analysis/dataset_definition.py --season_year 2017 --output output/dataset_2017.csv.gz
    outputs:
      highly_sensitive:
        dataset: output/dataset_2017.csv.gz
 

  # Job 2: Baseline demographics & CRD prevalence
  baseline_demographics:
    run: Rscript:v2 analysis/01_baseline_demographics.R
    needs: [generate_dataset_winter_2017_18]
    outputs:
      moderately_sensitive:
        demographics_table: output/table_baseline_demographics.csv
        demographics_figure: output/figure_demographics.png

  # Job 3: Calculate epidemic threshold (data-driven winter definition)
  winter_threshold:
    run: Rscript:v2 analysis/02_winter_threshold.R
    needs: [baseline_demographics]
    outputs:
      moderately_sensitive:
        threshold_summary: output/winter_threshold_summary.csv
        threshold_plot: output/figure_epidemic_threshold.png

  # Job 4: Primary analysis - ARI hospitalisation burden
  ari_analysis:
    run: Rscript:v2 analysis/03_ari_hospitalisation.R
    needs: [winter_threshold]
    outputs:
      moderately_sensitive:
        ari_burden_table: output/table_ari_burden.csv
        ari_figure: output/figure_ari_burden.png

  # Job 5: Temporal trends - mixed-effects regression
  temporal_trends:
    run: Rscript:v2 analysis/04_temporal_trends.R
    needs: [ari_analysis]
    outputs:
      moderately_sensitive:
        temporal_table: output/table_temporal_trends.csv
        temporal_figure: output/figure_temporal_trends.png

